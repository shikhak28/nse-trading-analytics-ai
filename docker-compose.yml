version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: stock-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: stockdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: stock-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
